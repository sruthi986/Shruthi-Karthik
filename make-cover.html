<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@400;600&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      width: 1200px; height: 630px;
      overflow: hidden; background: #f8f0e8;
      display: flex; align-items: stretch;
    }

    /* ── LEFT: Text side ── */
    .left {
      width: 560px; flex-shrink: 0;
      background: linear-gradient(160deg, #fdf8f2, #fdeef5, #f5eeff);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 50px;
      position: relative; overflow: hidden;
    }

    /* Botanical watermark corner */
    .left::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 180px; height: 180px;
      background:
        radial-gradient(circle at 20% 20%, rgba(180,200,140,0.25) 0%, transparent 60%);
    }
    .left::after {
      content: '';
      position: absolute; bottom: 0; right: 0;
      width: 160px; height: 160px;
      background:
        radial-gradient(circle at 80% 80%, rgba(232,126,161,0.12) 0%, transparent 60%);
    }

    /* Gold border accent */
    .left-border {
      position: absolute; inset: 16px;
      border: 1px solid rgba(180,140,80,0.2);
      pointer-events: none;
    }
    .left-border::before {
      content: ''; position: absolute; inset: 5px;
      border: 1px solid rgba(180,140,80,0.1);
    }

    /* Corner leaves */
    .leaf-tl { position:absolute; top:10px; left:10px; font-size:32px; opacity:0.35; transform:rotate(-20deg); }
    .leaf-tr { position:absolute; top:10px; right:10px; font-size:28px; opacity:0.3; transform:rotate(20deg) scaleX(-1); }
    .leaf-bl { position:absolute; bottom:10px; left:10px; font-size:26px; opacity:0.25; transform:rotate(160deg); }
    .leaf-br { position:absolute; bottom:10px; right:10px; font-size:30px; opacity:0.3; transform:rotate(-160deg) scaleX(-1); }

    .wedding-label {
      font-family: 'Cinzel', serif;
      font-size: 11px; letter-spacing: 7px;
      color: rgba(140,90,60,0.7);
      text-transform: uppercase; margin-bottom: 6px;
      position: relative; z-index:1;
    }

    .heart-divider {
      font-size: 14px; color: rgba(232,126,161,0.6);
      margin-bottom: 18px; letter-spacing: 8px;
      position: relative; z-index:1;
    }

    .bride-name {
      font-family: 'Great Vibes', cursive;
      font-size: 82px; color: #b05070;
      line-height: 1; position: relative; z-index:1;
      text-shadow: 0 2px 12px rgba(180,80,100,0.2);
    }

    .amp {
      font-family: 'Great Vibes', cursive;
      font-size: 42px; color: rgba(160,110,70,0.8);
      position: relative; z-index:1; margin: 2px 0;
    }

    .groom-name {
      font-family: 'Great Vibes', cursive;
      font-size: 82px; color: #b05070;
      line-height: 1; position: relative; z-index:1;
      text-shadow: 0 2px 12px rgba(180,80,100,0.2);
    }

    .date-line {
      font-family: 'Cinzel', serif;
      font-size: 11px; letter-spacing: 3px;
      color: rgba(120,80,60,0.6);
      margin-top: 20px; position: relative; z-index:1;
    }

    /* ── RIGHT: Photo side ── */
    .right {
      flex: 1; position: relative; overflow: hidden;
    }
    .right img {
      width: 100%; height: 100%; object-fit: cover;
      object-position: center top;
    }

    /* Gradient overlay on photo left edge to blend */
    .right::before {
      content: '';
      position: absolute; top:0; left:0; bottom:0; width:80px;
      background: linear-gradient(90deg, #fdeef5, transparent);
      z-index: 1;
    }
    /* Subtle dark overlay at top/bottom */
    .right::after {
      content: '';
      position: absolute; inset:0;
      background: linear-gradient(180deg,
        rgba(0,0,0,0.06) 0%, transparent 30%,
        transparent 70%, rgba(0,0,0,0.1) 100%);
      z-index: 1;
    }

    /* Bottom instructions bar — will be cropped in screenshot */
    .instructions {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #222; color: #fff; padding: 8px 16px;
      font-family: Arial, sans-serif; font-size: 12px;
      display: flex; align-items: center; gap: 20px;
      z-index: 999;
    }
    .instructions strong { color: #f0d080; }
  </style>
</head>
<body>

  <!-- LEFT — Text -->
  <div class="left">
    <div class="left-border"></div>
    <div class="leaf-tl">🌿</div>
    <div class="leaf-tr">🌿</div>
    <div class="leaf-bl">🌸</div>
    <div class="leaf-br">🌸</div>

    <div class="wedding-label">Wedding Invitation</div>
    <div class="heart-divider">♡</div>

    <div class="bride-name">Shruthi</div>
    <div class="amp">&amp;</div>
    <div class="groom-name">Karthik</div>

    <div class="date-line">02 · JULY · 2026</div>
  </div>

  <!-- RIGHT — Couple Photo -->
  <div class="right">
    <img src="photo2.jpg" alt="Shruthi & Karthik"/>
  </div>

</body>
</html>
